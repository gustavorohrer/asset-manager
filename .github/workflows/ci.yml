name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-build:
    name: Unit Tests and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./...

      - name: Build
        run: go build ./...

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-and-build

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: eclypsiumdb
          POSTGRES_USER: applicant
          POSTGRES_PASSWORD: goodluck
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U applicant -d eclypsiumdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://applicant:goodluck@localhost:5432/eclypsiumdb?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -d "$DATABASE_URL" && exit 0
            sleep 1
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Initialize schema
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/01-database.sql

      - name: Seed sample data
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/02-sample-data.sql

      - name: Run integration tests
        run: go test -tags=integration ./integration
